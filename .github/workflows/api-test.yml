name: Tests API Newman
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du Code
        uses: actions/checkout@v4

      - name: Installation Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Exécution des tests API
        # Ensure your collection.json is in the repository
        run: newman run ./postman/Test_Todo.json -e ./postman/prod_env.json --reporters cli,htmlextra --reporter-htmlextra-export ./postman/rapport.html

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: postman/
